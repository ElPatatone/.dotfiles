mods = "Shift"

[[keyboard.bindings]]
action = "CreateNewWindow"
key = "N"
mods = "Control|Shift"

[colors]
draw_bold_text_with_bright_colors = true
# true_color = true

[general]
import = ["/home/elpatatone/.dotfiles/alacritty/.config/alacritty/themes/custom.toml"]

[env]
TERM = "xterm-256color"

[font]
size = 10

[font.bold]
family = "MesloLGS NF"
style = "Bold"

[font.bold_italic]
family = "MesloLGS NF"
style = "Bold Italic"

[font.italic]
family = "MesloLGS NF"
style = "Italic"

[font.normal]
family = "MesloLGS NF"
style = "Regular"

[font.offset]
x = 0
y = 1

[scrolling]
history = 5000

[window]
decorations = "none"
dynamic_padding = false
opacity = 1
title = "Alacritty"

[window.class]
general = "Alacritty"
instance = "Alacritty"

[window.padding]
x = 6
y = 6

[keyboard]
